# Render Blueprint for "Transaction data validation and processing platform"
# To deploy, upload your repository to GitHub, go to the Render Dashboard,
# select "Blueprints", and select this repository.

databases:
  - name: xeno-db
    databaseName: xeno_db
    user: xeno_user
    plan: free # Free tier managed PostgreSQL database

services:
  # 1. Backend API Service
  - type: web
    name: xeno-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    rootDir: backend
    envVars:
      # Automatically use the provisioned PostgreSQL database
      - key: DATABASE_URL
        fromDatabase:
          name: xeno-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      # Mount persistent storage for uploaded and cleaned transaction sheets
      - key: UPLOAD_FOLDER
        value: /data/uploads
      - key: ROW_SPLIT_THRESHOLD
        value: 50000
    disk:
      name: uploads-disk
      mountPath: /data/uploads
      sizeGB: 1 # Free-tier persistent disk space

  # 2. Frontend React Client (Static Hosting)
  - type: web
    name: xeno-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: dist
    rootDir: frontend
    envVars:
      # Inject backend web service's domain dynamically into frontend build environment
      - key: VITE_API_URL
        fromService:
          type: web
          name: xeno-backend
          property: host
