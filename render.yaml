# Render Blueprint for "Transaction data validation and processing platform"
# To deploy, upload your repository to GitHub, go to the Render Dashboard,
# select "Blueprints", and select this repository.

services:
  # 1. Backend API Service (Flask)
  - type: web
    name: xeno-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    rootDir: backend
    envVars:
      # Use a local self-contained SQLite database file (Requires NO card info on Render)
      - key: DATABASE_URL
        value: sqlite:///transaction_guard.db
      - key: SECRET_KEY
        generateValue: true
      - key: ROW_SPLIT_THRESHOLD
        value: 50000

  # 2. Frontend React Client (Static Hosting)
  - type: web
    name: xeno-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      # Inject backend web service's domain dynamically into frontend build environment
      - key: VITE_API_URL
        fromService:
          type: web
          name: xeno-backend
          property: host
